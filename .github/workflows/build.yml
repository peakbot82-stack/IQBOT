name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Actualizado a v4
    
    - name: Setup Python
      uses: actions/setup-python@v5  # Actualizado a v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt || true
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build with Buildozer
      run: |
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4  # ACTUALIZADO: v3 → v4
      with:
        name: ZEUS-BOT-APK
        path: bin/*.apk
        # Si quieres que el artifact nunca expire, puedes añadir:
        # retention-days: 1  # El valor por defecto es 90 días
