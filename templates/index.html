<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ ZEUS BOT</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                <span class="icon">⚡</span>
                <span class="title">ZEUS BOT</span>
            </div>
            <div class="status">
                <span id="led" class="led off">●</span>
                <span id="modo" class="modo">DEMO</span>
            </div>
        </div>

        <!-- BALANCE -->
        <div class="card balance-card">
            <div class="card-label">💰 BALANCE</div>
            <div class="balance-value" id="balance">$0.00</div>
        </div>

        <!-- LOGIN -->
        <div id="login-section" class="card login-card">
            <div class="input-group">
                <label>📧 USUARIO</label>
                <input type="text" id="email" value="mariasaez4595@gmail.com" placeholder="Email">
            </div>
            <div class="input-group">
                <label>🔑 CONTRASEÑA</label>
                <input type="password" id="password" value="14538139" placeholder="Contraseña">
            </div>
            <button class="btn btn-connect" id="btn-conectar">⚡ CONECTAR</button>
            <div id="estado-conexion" class="estado"></div>
        </div>

        <!-- CONFIGURACIÓN -->
        <div id="config-section" class="card config-card" style="display:none;">
            <div class="config-row">
                <label>PAR</label>
                <select id="par-select"></select>
            </div>
            <div class="config-row">
                <label>$</label>
                <input type="number" id="monto" value="1" min="1" max="100">
                <label>T</label>
                <select id="tiempo">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="5">5</option>
                </select>
                <label>M</label>
                <select id="martingala">
                    <option value="no">no</option>
                    <option value="si">si</option>
                </select>
                <label>×</label>
                <input type="number" id="multiplicador" value="2.1" step="0.1" min="2.1" max="3.0">
                <label>U</label>
                <input type="number" id="umbral" value="0.5" step="0.1" min="0.1" max="5.0">
            </div>
        </div>

        <!-- BOTONES -->
        <div class="btn-group">
            <button class="btn btn-start" id="btn-iniciar">▶ INICIAR</button>
            <button class="btn btn-stop" id="btn-detener" disabled>⏹ DETENER</button>
        </div>

        <!-- ESTADÍSTICAS -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">📊 OPS</span>
                <span class="stat-value" id="ops">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">🎯 WIN%</span>
                <span class="stat-value win" id="winrate">0%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">📈 G/P</span>
                <span class="stat-value" id="gp">0/0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">🔥 RACHA</span>
                <span class="stat-value" id="racha">0</span>
            </div>
        </div>

        <!-- PROFIT -->
        <div class="profit-row">
            <span>💵 PROFIT</span>
            <span id="profit" class="profit-positive">$0.00</span>
        </div>

        <!-- ENFOCADO -->
        <div class="enfoque-row">
            <span>🎯 ENFOCADO:</span>
            <span id="enfoque">NINGUNO</span>
        </div>

        <!-- ÚLTIMA OPERACIÓN -->
        <div class="ultima-row">
            <span>🕐 ÚLTIMA:</span>
            <span id="ultima">---</span>
        </div>

        <!-- LOG -->
        <div class="log-container">
            <div class="log-header">📡 SEÑALES</div>
            <div class="log-content" id="log-content"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
